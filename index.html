<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うまじゃんぷ</title>

<style>
/* 太くてかわいいフォント */
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@900&display=swap');

body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  background: linear-gradient(#87CEEB, #bfe9ff);
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-weight: 900;
}

/* スタート画面 */
#startScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 40px;
  z-index: 10;
}

/* タイトル */
#title {
  font-size: 40px;
  color: #ffcc00;
  text-align: center;

  text-shadow:
    -3px -3px 0 #ff66cc,
     3px -3px 0 #ff66cc,
    -3px  3px 0 #ff66cc,
     3px  3px 0 #ff66cc;
}

/* スタートボタン */
#startButton {
  padding: 15px 30px;
  font-size: 18px;
  background: #ffcc00;
  color: #333;
  border: 4px solid #ff66cc;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

#startButton:hover {
  transform: scale(1.1);
  background: #ffd633;
}

/* 雲 */
.cloud {
  position: absolute;
  width: 120px;
  height: 60px;
  background: white;
  border-radius: 50px;
}

.cloud::before,
.cloud::after {
  content: "";
  position: absolute;
  background: white;
  border-radius: 50%;
}

.cloud::before {
  width: 60px;
  height: 60px;
  top: -20px;
  left: 10px;
}

.cloud::after {
  width: 80px;
  height: 80px;
  top: -30px;
  right: 10px;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* 地面 */
.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 100px;
  background: linear-gradient(#3cb043 30%, #8B5A2B 30%);
  border-top: 4px solid #2e8b57;
}

/* 馬 */
.horse {
  position: absolute;
  bottom: 100px;
  right: 50px;
  font-size: 50px;
}

/* サボテン */
.obstacle {
  position: absolute;
  bottom: 100px;
  left: -50px;
  font-size: 40px;
}

/* スコア */
#score {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 22px;
  color: white;

  text-shadow:
    -2px -2px 0 #ff66cc,
     2px -2px 0 #ff66cc,
    -2px  2px 0 #ff66cc,
     2px  2px 0 #ff66cc;
}

/* ゲームオーバー */
#gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 18px;
  color: white;
  display: none;
  text-align: center;

  text-shadow:
    -2px -2px 0 #ff66cc,
     2px -2px 0 #ff66cc,
    -2px  2px 0 #ff66cc,
     2px  2px 0 #ff66cc;
}
</style>
</head>

<body>

<div id="startScreen">
  <div id="title">🐎<br>うまじゃんぷ</div>
  <button id="startButton">スタート</button>
</div>

<div id="game">
  <div class="cloud" id="cloud1" style="top:50px; left:200px;"></div>
  <div class="cloud" id="cloud2" style="top:100px; left:500px;"></div>

  <div id="score">Score: 0</div>
  <div id="gameOver">ゲームオーバー！<br>クリックでリスタート</div>

  <div class="horse" id="horse">🐎</div>
  <div class="obstacle" id="obstacle">🌵</div>
  <div class="ground"></div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const startButton = document.getElementById("startButton");
const horse = document.getElementById("horse");
const obstacle = document.getElementById("obstacle");
const scoreDisplay = document.getElementById("score");
const gameOverText = document.getElementById("gameOver");

let gameStarted = false;
let gameOver = false;

let isJumping = false;
let velocity = 0;
let gravity = 0.8;
let position = 0;

let obstacleX = -50;
let speed = 6;
let score = 0;

let cloudX1 = 200;
let cloudX2 = 500;

/* スタート */
startButton.onclick = () => {
  startScreen.style.display = "none";
  gameStarted = true;
  update();
};

function jump() {
  if (!gameStarted || isJumping || gameOver) return;
  isJumping = true;
  velocity = 15;
}

function update() {
  if (!gameStarted || gameOver) return;

  cloudX1 += speed * 0.3;
  cloudX2 += speed * 0.2;

  if (cloudX1 > window.innerWidth) cloudX1 = -150;
  if (cloudX2 > window.innerWidth) cloudX2 = -150;

  document.getElementById("cloud1").style.left = cloudX1 + "px";
  document.getElementById("cloud2").style.left = cloudX2 + "px";

  velocity -= gravity;
  position += velocity;

  if (position <= 0) {
    position = 0;
    isJumping = false;
  }

  horse.style.bottom = (100 + position) + "px";

  obstacleX += speed;

  if (obstacleX > window.innerWidth) {
    obstacleX = -50;
    score += 100;
    scoreDisplay.textContent = "Score: " + score;

    if (score % 500 === 0) speed += 0.5;
  }

  obstacle.style.left = obstacleX + "px";

  const h = horse.getBoundingClientRect();
  const o = obstacle.getBoundingClientRect();
  const pad = 15;

  if (
    h.left + pad < o.right &&
    h.right - pad > o.left &&
    h.bottom - pad > o.top + pad
  ) {
    gameOver = true;
    gameOverText.style.display = "block";
  }

  requestAnimationFrame(update);
}

function restart() {
  gameOver = false;
  position = 0;
  obstacleX = -50;
  score = 0;
  speed = 6;
  gameOverText.style.display = "none";
  scoreDisplay.textContent = "Score: 0";
  update();
}

document.addEventListener("click", () => {
  if (gameOver) restart();
  else jump();
});

document.addEventListener("keydown", jump);
</script>

</body>
</html>

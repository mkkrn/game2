<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うまじゃんぷ</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@900&display=swap');

body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  background: linear-gradient(#87CEEB, #bfe9ff);
  font-family: 'M PLUS Rounded 1c', sans-serif;
}

/* スタート画面 */
#startScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 40px;
  z-index: 10;
}

/* タイトル */
#title {
  font-size: 48px;
  color: #ffe066;
  text-align: center;
  text-shadow:
    -4px -4px 0 #66ccff,
     4px -4px 0 #66ccff,
    -4px  4px 0 #66ccff,
     4px  4px 0 #66ccff;
}

/* ボタン */
#startButton {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-weight: 900;
  padding: 20px 60px;
  font-size: 24px;
  border-radius: 40px;
  border: none;
  background: linear-gradient(to bottom, #ffd94d, #ff9900);
  color: white;
  cursor: pointer;
}

/* 雲 */
.cloud {
  position: absolute;
  width: 120px;
  height: 60px;
  background: white;
  border-radius: 50px;
}
.cloud::before, .cloud::after {
  content: "";
  position: absolute;
  background: white;
  border-radius: 50%;
}
.cloud::before {
  width: 60px; height: 60px; top: -20px; left: 10px;
}
.cloud::after {
  width: 80px; height: 80px; top: -30px; right: 10px;
}

/* 地面 */
.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 100px;
  background: linear-gradient(#3cb043 30%, #8B5A2B 30%);
}

/* ⭐ 馬（画像） */
.horse {
  position: absolute;
  bottom: 105px;
  right: 50px;
  width: 120px;
  image-rendering: pixelated;
}

/* サボテン */
.obstacle {
  position: absolute;
  bottom: 100px;
  left: -50px;
  font-size: 40px;
}

/* スコア */
#score {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 28px;
  color: white;
  text-shadow:
    -2px -2px 0 #ffd94d,
     2px -2px 0 #ffd94d,
    -2px  2px 0 #ffd94d,
     2px  2px 0 #ffd94d;
}

/* ハイスコア */
#highScore {
  position: absolute;
  top: 45px;
  left: 10px;
  font-size: 24px;
  color: white;
  text-shadow:
    -2px -2px 0 #ffd94d,
     2px -2px 0 #ffd94d,
    -2px  2px 0 #ffd94d,
     2px  2px 0 #ffd94d;
}

/* ゲームオーバー */
#gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px;
  color: white;
  display: none;
  text-align: center;
  text-shadow:
    -3px -3px 0 #ffd94d,
     3px -3px 0 #ffd94d,
    -3px  3px 0 #ffd94d,
     3px  3px 0 #ffd94d;
}
</style>
</head>

<body>

<div id="startScreen">
  <div id="title">🐎 うまじゃんぷ 🐎</div>
  <button id="startButton">スタート</button>
</div>

<div id="game">
  <div class="cloud" id="cloud1" style="top:50px; left:200px;"></div>
  <div class="cloud" id="cloud2" style="top:100px; left:500px;"></div>

  <div id="score">Score: 0</div>
  <div id="highScore">High Score: 0</div>
  <div id="gameOver">ゲームオーバー！<br>クリックでリスタート</div>

  <!-- ⭐ 馬画像（ここに埋め込み） -->
  <img id="horse" class="horse" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..." />

  <div class="obstacle" id="obstacle">🌵</div>
  <div class="ground"></div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const startButton = document.getElementById("startButton");
const horse = document.getElementById("horse");
const obstacle = document.getElementById("obstacle");
const scoreDisplay = document.getElementById("score");
const highScoreDisplay = document.getElementById("highScore");
const gameOverText = document.getElementById("gameOver");

let highScore = localStorage.getItem("umaHighScore") || 0;
highScoreDisplay.textContent = "High Score: " + highScore;

let gameStarted = false;
let gameOver = false;

let isJumping = false;
let velocity = 0;
let gravity = 0.8;
let position = 0;

let obstacleX = -50;
let speed = 6;
let score = 0;

let cloudX1 = 200;
let cloudX2 = 500;

startButton.onclick = () => {
  startScreen.style.display = "none";
  gameStarted = true;
  update();
};

function jump() {
  if (!gameStarted || isJumping || gameOver) return;
  isJumping = true;
  velocity = 15;
}

function update() {
  if (!gameStarted || gameOver) return;

  cloudX1 += speed * 0.3;
  cloudX2 += speed * 0.2;

  if (cloudX1 > window.innerWidth) cloudX1 = -150;
  if (cloudX2 > window.innerWidth) cloudX2 = -150;

  document.getElementById("cloud1").style.left = cloudX1 + "px";
  document.getElementById("cloud2").style.left = cloudX2 + "px";

  velocity -= gravity;
  position += velocity;

  if (position <= 0) {
    position = 0;
    isJumping = false;
  }

  horse.style.bottom = (105 + position) + "px";

  obstacleX += speed;

  if (obstacleX > window.innerWidth) {
    obstacleX = -50;
    score += 100;
    scoreDisplay.textContent = "Score: " + score;

    if (score > highScore) {
      highScore = score;
      localStorage.setItem("umaHighScore", highScore);
      highScoreDisplay.textContent = "High Score: " + highScore;
    }
  }

  obstacle.style.left = obstacleX + "px";

  const h = horse.getBoundingClientRect();
  const o = obstacle.getBoundingClientRect();

  if (
    h.left + 20 < o.right &&
    h.right - 20 > o.left &&
    h.bottom - 20 > o.top
  ) {
    gameOver = true;
    gameOverText.style.display = "block";
  }

  requestAnimationFrame(update);
}

function restart() {
  gameOver = false;
  position = 0;
  obstacleX = -50;
  score = 0;
  gameOverText.style.display = "none";
  scoreDisplay.textContent = "Score: 0";
  update();
}

document.addEventListener("click", () => {
  if (gameOver) restart();
  else jump();
});

document.addEventListener("keydown", jump);
</script>

</body>
</html>

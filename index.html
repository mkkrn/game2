<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>馬ランゲーム</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    background: linear-gradient(#87CEEB, #bfe9ff);
    font-family: sans-serif;
  }

  /* 雲 */
  .cloud {
    position: absolute;
    top: 50px;
    width: 120px;
    height: 60px;
    background: white;
    border-radius: 50px;
    opacity: 0.9;
  }

  .cloud::before,
  .cloud::after {
    content: "";
    position: absolute;
    background: white;
    border-radius: 50%;
  }

  .cloud::before {
    width: 60px;
    height: 60px;
    top: -20px;
    left: 10px;
  }

  .cloud::after {
    width: 80px;
    height: 80px;
    top: -30px;
    right: 10px;
  }

  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* 地面 */
  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 100px;
    background: linear-gradient(
      to bottom,
      #3cb043 0%,
      #3cb043 30%,
      #8B5A2B 30%,
      #8B5A2B 100%
    );
    border-top: 4px solid #2e8b57;
  }

  /* 馬（右） */
  .horse {
    position: absolute;
    bottom: 100px;
    right: 50px;
    font-size: 50px;
     /* 左向き */
  }

  /* サボテン（左から出る） */
  .obstacle {
    position: absolute;
    bottom: 100px;
    left: -50px;
    font-size: 40px;
  }

  #score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 24px;
    color: white;
  }

  #gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    color: red;
    display: none;
  }
</style>
</head>
<body>
<div id="game">
  <div class="cloud" id="cloud1" style="left: 200px;"></div>
  <div class="cloud" id="cloud2" style="left: 500px; top: 100px;"></div>

  <div id="score">Score: 0</div>
  <div id="gameOver">ゲームオーバー！クリックでリスタート</div>

  <div class="horse" id="horse">🐎</div>
  <div class="obstacle" id="obstacle">🌵</div>
  <div class="ground"></div>
</div>

<script>
const horse = document.getElementById("horse");
const obstacle = document.getElementById("obstacle");
const scoreDisplay = document.getElementById("score");
const gameOverText = document.getElementById("gameOver");

let isJumping = false;
let velocity = 0;
let gravity = 0.8;
let position = 0;
let obstacleX = -50;
let speed = 6;
let score = 0;
let gameOver = false;
let cloudX1 = 200;
let cloudX2 = 500;

function jump() {
  if (isJumping || gameOver) return;
  isJumping = true;
  velocity = 15;
}

function update() {
  if (gameOver) return;

  // 雲
  cloudX1 += speed * 0.3;
  cloudX2 += speed * 0.2;

  if (cloudX1 > window.innerWidth) cloudX1 = -150;
  if (cloudX2 > window.innerWidth) cloudX2 = -150;

  document.getElementById("cloud1").style.left = cloudX1 + "px";
  document.getElementById("cloud2").style.left = cloudX2 + "px";

  // ジャンプ
  velocity -= gravity;
  position += velocity;

  if (position <= 0) {
    position = 0;
    isJumping = false;
  }

  horse.style.bottom = (100 + position) + "px";

  // サボテン（左 → 右）
  obstacleX += speed;

  if (obstacleX > window.innerWidth) {
    obstacleX = -50;
    score += 100;
    scoreDisplay.textContent = "Score: " + score;

    if (score % 500 === 0) {
      speed += 0.5;
    }
  }

  obstacle.style.left = obstacleX + "px";

  // 当たり判定
  const horseRect = horse.getBoundingClientRect();
  const obstacleRect = obstacle.getBoundingClientRect();
  const padding = 25;

  if (
    horseRect.left + padding < obstacleRect.right &&
    horseRect.right - padding > obstacleRect.left &&
    horseRect.bottom - padding > obstacleRect.top + padding
  ) {
    endGame();
  }

  requestAnimationFrame(update);
}

function endGame() {
  gameOver = true;
  gameOverText.style.display = "block";
}

function restart() {
  position = 0;
  obstacleX = -50;
  score = 0;
  speed = 6;
  gameOver = false;
  gameOverText.style.display = "none";
  scoreDisplay.textContent = "Score: 0";
  update();
}

// 操作
document.addEventListener("keydown", jump);
document.addEventListener("click", () => {
  if (gameOver) {
    restart();
  } else {
    jump();
  }
});

update();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うまじゃんぷ</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@900&display=swap');

body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  background: linear-gradient(#87CEEB, #bfe9ff);
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-weight: 900;
}

/* スタート画面 */
#startScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

/* ⭐ ぷっくりSTARTボタン */
#startButton {
  position: relative;
  padding: 20px 60px;
  font-size: 26px;
  color: white;
  border: none;
  border-radius: 40px;
  cursor: pointer;

  /* グラデーション */
  background: linear-gradient(to bottom, #ffd94d, #ff9900);

  /* 立体感 */
  box-shadow:
    0 8px 0 #cc7a00,
    0 12px 15px rgba(0,0,0,0.2);

  /* 文字 */
  text-shadow:
    0 2px 0 rgba(0,0,0,0.3);
}

/* 上のツヤ */
#startButton::before {
  content: "";
  position: absolute;
  top: 6px;
  left: 10%;
  width: 80%;
  height: 40%;
  background: rgba(255,255,255,0.5);
  border-radius: 30px;
}

/* 左上のキラ */
#startButton::after {
  content: "";
  position: absolute;
  top: 8px;
  left: 20px;
  width: 15px;
  height: 15px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
}

/* ホバー */
#startButton:hover {
  transform: scale(1.05);
}

/* 押したとき */
#startButton:active {
  transform: translateY(6px);
  box-shadow:
    0 2px 0 #cc7a00,
    0 5px 8px rgba(0,0,0,0.2);
}

/* ゲームエリア */
#game {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* 雲 */
.cloud {
  position: absolute;
  width: 120px;
  height: 60px;
  background: white;
  border-radius: 50px;
}

.cloud::before,
.cloud::after {
  content: "";
  position: absolute;
  background: white;
  border-radius: 50%;
}

.cloud::before {
  width: 60px;
  height: 60px;
  top: -20px;
  left: 10px;
}

.cloud::after {
  width: 80px;
  height: 80px;
  top: -30px;
  right: 10px;
}

/* 地面 */
.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 100px;
  background: linear-gradient(#3cb043 30%, #8B5A2B 30%);
}

/* 馬 */
.horse {
  position: absolute;
  bottom: 100px;
  right: 50px;
  font-size: 50px;
}

/* サボテン */
.obstacle {
  position: absolute;
  bottom: 100px;
  left: -50px;
  font-size: 40px;
}

/* スコア */
#score {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 22px;
  color: white;
}

/* ゲームオーバー */
#gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 20px;
  color: white;
  display: none;
}
</style>
</head>

<body>

<div id="startScreen">
  <button id="startButton">START</button>
</div>

<div id="game">
  <div class="cloud" id="cloud1" style="top:50px; left:200px;"></div>
  <div class="cloud" id="cloud2" style="top:100px; left:500px;"></div>

  <div id="score">Score: 0</div>
  <div id="gameOver">ゲームオーバー！クリックでリスタート</div>

  <div class="horse" id="horse">🐎</div>
  <div class="obstacle" id="obstacle">🌵</div>
  <div class="ground"></div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const startButton = document.getElementById("startButton");
const horse = document.getElementById("horse");
const obstacle = document.getElementById("obstacle");
const scoreDisplay = document.getElementById("score");
const gameOverText = document.getElementById("gameOver");

let gameStarted = false;
let gameOver = false;

let isJumping = false;
let velocity = 0;
let gravity = 0.8;
let position = 0;

let obstacleX = -50;
let speed = 6;
let score = 0;

let cloudX1 = 200;
let cloudX2 = 500;

startButton.onclick = () => {
  startScreen.style.display = "none";
  gameStarted = true;
  update();
};

function jump() {
  if (!gameStarted || isJumping || gameOver) return;
  isJumping = true;
  velocity = 15;
}

function update() {
  if (!gameStarted || gameOver) return;

  cloudX1 += speed * 0.3;
  cloudX2 += speed * 0.2;

  if (cloudX1 > window.innerWidth) cloudX1 = -150;
  if (cloudX2 > window.innerWidth) cloudX2 = -150;

  document.getElementById("cloud1").style.left = cloudX1 + "px";
  document.getElementById("cloud2").style.left = cloudX2 + "px";

  velocity -= gravity;
  position += velocity;

  if (position <= 0) {
    position = 0;
    isJumping = false;
  }

  horse.style.bottom = (100 + position) + "px";

  obstacleX += speed;

  if (obstacleX > window.innerWidth) {
    obstacleX = -50;
    score += 100;
    scoreDisplay.textContent = "Score: " + score;
  }

  obstacle.style.left = obstacleX + "px";

  const h = horse.getBoundingClientRect();
  const o = obstacle.getBoundingClientRect();

  if (
    h.left < o.right &&
    h.right > o.left &&
    h.bottom > o.top
  ) {
    gameOver = true;
    gameOverText.style.display = "block";
  }

  requestAnimationFrame(update);
}

function restart() {
  gameOver = false;
  position = 0;
  obstacleX = -50;
  score = 0;
  gameOverText.style.display = "none";
  scoreDisplay.textContent = "Score: 0";
  update();
}

document.addEventListener("click", () => {
  if (gameOver) restart();
  else jump();
});

document.addEventListener("keydown", jump);
</script>

</body>
</html>
